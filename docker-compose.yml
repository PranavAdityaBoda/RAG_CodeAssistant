services:
  backend:
    build: ./backend
    container_name: codelens-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=docker
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: codelens-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
